<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextWealth Contest — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0f2a4a;--blue:#1a5fa8;--gold:#f5a623;--green:#1a7a4a;--red:#c0392b;--bg:#f4f6f9;--surface:#fff;--border:#e0e4ea;--text:#1a1a2e;--text2:#6b7280;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f2a4a,#1a5fa8);}
.login-card{background:var(--surface);border-radius:16px;padding:36px;max-width:400px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2);text-align:center;}
.login-logo{width:60px;height:60px;background:var(--navy);border-radius:13px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:22px;color:var(--gold);}
.login-card h2{font-family:'Syne',sans-serif;font-size:20px;margin-bottom:6px;color:var(--navy);}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;}
.login-card input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;margin-bottom:10px;background:var(--surface);color:var(--text);}
.login-card input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,.08);}
.login-hint{font-size:11px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.login-hint a{color:var(--blue);}
.err-msg{font-size:12px;color:var(--red);margin-bottom:10px;display:none;}

/* HEADER */
.app-header{background:var(--navy);color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:12px;}
.hlogo{width:34px;height:34px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--navy);}
.app-header h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;}
.sub-h{font-size:11px;color:rgba(255,255,255,.55);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover{background:#1550a0;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{background:#f0f2f5;}
.btn-white{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2);}
.btn-white:hover{background:rgba(255,255,255,.2);}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca;}
.btn-danger:hover{background:#fecaca;}

/* DASHBOARD */
.admin-wrap{max-width:1100px;margin:0 auto;padding:24px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.stat-c .sv{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--blue);}
.stat-c .sl{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.admin-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.admin-tab{padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'DM Sans',sans-serif;transition:color .15s;}
.admin-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.admin-panel{display:none;}.admin-panel.active{display:block;}

/* LEADERBOARD */
.lb-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.lb-head{display:grid;grid-template-columns:50px 1fr 58px 58px 58px 58px 58px 58px 58px 80px;background:var(--navy);color:white;font-size:10px;font-weight:600;padding:12px 16px;letter-spacing:.6px;text-transform:uppercase;}
.lb-row{display:grid;grid-template-columns:50px 1fr 58px 58px 58px 58px 58px 58px 58px 80px;padding:13px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .1s;font-size:13px;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:#f8f9ff;}
.rank-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;}
.r1{background:var(--gold);color:var(--navy);}.r2{background:#9e9e9e;color:white;}.r3{background:#cd7f32;color:white;}.rn{background:#f0f2f5;color:var(--text2);}
.sc{font-size:11px;font-weight:600;text-align:center;padding:4px 6px;border-radius:5px;}
.sh{background:#dcfce7;color:#166534;}.sm{background:#fef9c3;color:#854d0e;}.sl2{background:#fee2e2;color:#991b1b;}
.total-sc{font-size:16px;font-weight:700;font-family:'Syne',sans-serif;color:var(--blue);text-align:right;}
.detail-row{display:none;background:#f8fafc;padding:18px 16px;border-bottom:1px solid var(--border);}
.detail-row.open{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.dq{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;}
.dq-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.dq-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;}
.q-score-pill{font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;}
.pill-high{background:#dcfce7;color:#166534;}.pill-mid{background:#fef9c3;color:#854d0e;}.pill-low{background:#fee2e2;color:#991b1b;}
.prompt-snippet{font-size:11px;background:#f0f7ff;padding:8px 10px;border-radius:5px;border-left:2px solid var(--blue);color:var(--text);margin:6px 0;line-height:1.65;}
.dq-criteria{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.dc{text-align:center;padding:7px;background:#f8fafc;border-radius:5px;}
.dc .dv{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;}
.dc .dl{font-size:9px;color:var(--text2);margin-top:2px;}

/* RESPONSES */
.response-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.rc-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.rc-name{font-weight:600;font-size:15px;color:var(--navy);}
.rc-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.rc-score{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--blue);}
.rc-q{padding:10px 0;border-bottom:1px solid var(--border);}
.rc-q:last-child{border-bottom:none;}
.rc-q-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.rc-q-label{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;}
.rc-prompt{font-size:12px;background:#f0f7ff;padding:8px 11px;border-radius:5px;border-left:2px solid var(--blue);color:var(--text);line-height:1.65;}

.empty{text-align:center;padding:48px 24px;}
.empty h3{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text2);}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;}
.refresh-time{font-size:11px;color:rgba(255,255,255,.5);margin-right:8px;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">NW</div>
      <h2>Admin Dashboard</h2>
      <p>Enter your Anthropic API key and admin password to access the contest dashboard.</p>
      <input type="password" id="api-key-input" placeholder="Anthropic API Key (sk-ant-...)" />
      <p class="login-hint">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      <input type="password" id="admin-pw-input" placeholder="Admin Password" />
      <div class="err-msg" id="err-msg">Incorrect password. Please try again.</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" onclick="adminLogin()">Login to Dashboard →</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="s-dashboard" class="screen">
  <div class="app-header">
    <div class="logo"><div class="hlogo">NW</div><div><h1>Admin Dashboard</h1><div class="sub-h">NextWealth Prompt Engineering Contest</div></div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="refresh-time" id="last-refresh"></span>
      <button class="btn btn-white" onclick="refreshData()" id="refresh-btn">↻ Refresh</button>
      <button class="btn btn-white" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-danger" onclick="clearData()">Clear Data</button>
    </div>
  </div>
  <div class="admin-wrap">
    <div id="stats-row" class="stats-row"></div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
      <button class="admin-tab" onclick="switchTab('responses')">📋 All Responses</button>
    </div>
    <div id="ap-leaderboard" class="admin-panel active"><div id="lb-content"></div></div>
    <div id="ap-responses" class="admin-panel"><div id="resp-content"></div></div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'Admin123';
const API_BASE = window.location.origin;
let apiKey = '';
let allData = [];
let refreshTimer = null;

const Q_TOPICS = ['Hallucination Control','Customer Support Chatbot','Bias Detection','Data Classification','Entity Extraction','Explain LLMs Simply','Role-Based Perspectives','Chain-of-Thought Reasoning'];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function adminLogin(){
  const key=document.getElementById('api-key-input').value.trim();
  const pw=document.getElementById('admin-pw-input').value.trim();
  const err=document.getElementById('err-msg');
  if(!key||!key.startsWith('sk-')){err.textContent='Please enter a valid Anthropic API key.';err.style.display='block';return;}
  if(pw!==ADMIN_PASSWORD){err.textContent='Incorrect admin password.';err.style.display='block';return;}
  err.style.display='none';
  apiKey=key;
  // Store API key in session for backend calls
  sessionStorage.setItem('nw_api_key',key);
  showScreen('s-dashboard');
  loadData();
  // Auto-refresh every 30 seconds
  refreshTimer=setInterval(loadData,30000);
}

async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.innerHTML='<span class="spinner"></span> Loading...';
  try{
    const res=await fetch(API_BASE+'/api/score?action=all&password='+encodeURIComponent(ADMIN_PASSWORD));
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Failed to load');
    allData=data.submissions||[];
    renderDashboard();
    document.getElementById('last-refresh').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('last-refresh').textContent='Error: '+e.message;
  }
  btn.innerHTML='↻ Refresh';
}

function refreshData(){loadData();}

function scClass(s){return s>=38?'sh':s>=25?'sm':'sl2';}
function pillClass(s){return s>=38?'pill-high':s>=25?'pill-mid':'pill-low';}

function renderDashboard(){
  const sorted=[...allData].sort((a,b)=>b.total-a.total);
  const avg=sorted.length?Math.round(sorted.reduce((s,p)=>s+p.total,0)/sorted.length):0;
  const top=sorted[0]?.total||0;
  const completing=sorted.filter(p=>p.results?.filter(r=>r.weighted_score>0).length===8).length;

  document.getElementById('stats-row').innerHTML=
    `<div class="stat-c"><div class="sv">${sorted.length}</div><div class="sl">Participants</div></div>
     <div class="stat-c"><div class="sv">${avg}</div><div class="sl">Avg Score</div></div>
     <div class="stat-c"><div class="sv">${top}</div><div class="sl">Top Score</div></div>
     <div class="stat-c"><div class="sv">${completing}</div><div class="sl">Completed All 8</div></div>`;

  if(sorted.length===0){
    document.getElementById('lb-content').innerHTML='<div class="empty"><h3>No submissions yet</h3><p>Scores will appear here as participants complete the contest. This page auto-refreshes every 30 seconds.</p></div>';
    document.getElementById('resp-content').innerHTML='<div class="empty"><h3>No responses yet</h3></div>';
    return;
  }

  document.getElementById('lb-content').innerHTML=`
    <div class="lb-table">
      <div class="lb-head">
        <span>Rank</span><span>Participant</span>
        <span style="text-align:center">Q1</span><span style="text-align:center">Q2</span>
        <span style="text-align:center">Q3</span><span style="text-align:center">Q4</span>
        <span style="text-align:center">Q5</span><span style="text-align:center">Q6</span>
        <span style="text-align:center">Q7+8</span><span style="text-align:right">Total</span>
      </div>
      ${sorted.map((p,i)=>{
        const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        const q=p.results||[];
        const q78=Math.round(((q[6]?.weighted_score||0)+(q[7]?.weighted_score||0))/2);
        return `
          <div class="lb-row" onclick="toggleDetail('d-${i}')">
            <div><span class="rank-circle ${rc}">${i+1}</span></div>
            <div>
              <div style="font-weight:600;font-size:13px;color:var(--navy)">${p.participant.name}</div>
              <div style="font-size:11px;color:var(--text2)">${p.participant.team} · ${p.participant.experience||''}</div>
            </div>
            ${[0,1,2,3,4,5].map(qi=>`<div><span class="sc ${scClass(q[qi]?.weighted_score||0)}">${q[qi]?.weighted_score||0}</span></div>`).join('')}
            <div><span class="sc ${scClass(q78)}">${q78}</span></div>
            <div class="total-sc">${p.total}</div>
          </div>
          <div class="detail-row" id="d-${i}">
            ${Q_TOPICS.map((topic,qi)=>{
              const r=q[qi];
              const sc=r?.weighted_score||0;
              return `<div class="dq">
                <div class="dq-top">
                  <span class="dq-label">Q${qi+1} · ${topic}</span>
                  <span class="q-score-pill ${pillClass(sc)}">${sc}/50</span>
                </div>
                <div class="prompt-snippet">${(p.prompts?.[qi]||'No answer').substring(0,250)}${(p.prompts?.[qi]||'').length>250?'...':''}</div>
                <div class="dq-criteria">
                  <div class="dc"><div class="dv" style="color:var(--blue)">${r?.goal_achievement||0}/5</div><div class="dl">Goal</div></div>
                  <div class="dc"><div class="dv" style="color:var(--green)">${r?.clarity||0}/5</div><div class="dl">Clarity</div></div>
                  <div class="dc"><div class="dv" style="color:var(--gold)">${r?.creativity||0}/5</div><div class="dl">Creative</div></div>
                  <div class="dc"><div class="dv" style="color:#7c3aed">${r?.hallucination_control||0}/5</div><div class="dl">Grounding</div></div>
                </div>
                ${r?.feedback?`<p style="font-size:11px;color:var(--text2);font-style:italic;margin-top:8px;line-height:1.6">"${r.feedback}"</p>`:''}
              </div>`;
            }).join('')}
          </div>`;
      }).join('')}
    </div>`;

  document.getElementById('resp-content').innerHTML=sorted.map(p=>`
    <div class="response-card">
      <div class="rc-header">
        <div>
          <div class="rc-name">${p.participant.name}</div>
          <div class="rc-meta">${p.participant.team} · ${p.participant.email} · ${p.participant.experience||''} · ${new Date(p.timestamp).toLocaleString()}</div>
        </div>
        <div class="rc-score">${p.total}<span style="font-size:13px;color:var(--text2);font-family:'DM Sans',sans-serif">/400</span></div>
      </div>
      ${Q_TOPICS.map((topic,qi)=>{
        const r=(p.results||[])[qi];
        const sc=r?.weighted_score||0;
        return `<div class="rc-q">
          <div class="rc-q-header">
            <span class="rc-q-label">Q${qi+1} · ${topic}</span>
            <span style="font-size:12px;font-weight:700;color:${sc>=38?'var(--green)':sc>=25?'#854d0e':'var(--red)'}">${sc}/50</span>
          </div>
          <div class="rc-prompt">${p.prompts?.[qi]||'No answer submitted'}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function toggleDetail(id){document.getElementById(id).classList.toggle('open');}

function switchTab(tab){
  document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',['leaderboard','responses'][i]===tab));
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('ap-'+tab).classList.add('active');
}

function exportCSV(){
  const sorted=[...allData].sort((a,b)=>b.total-a.total);
  const headers=['Rank','Name','Email','Team','Experience',...Q_TOPICS.map((t,i)=>'Q'+(i+1)+'_'+t.replace(/ /g,'_')),'Total','Timestamp'];
  const rows=sorted.map((p,i)=>[
    i+1,p.participant.name,p.participant.email,p.participant.team,p.participant.experience||'',
    ...(p.results||[]).map(r=>r.weighted_score||0),
    p.total,new Date(p.timestamp).toLocaleString()
  ]);
  const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='nextwealth_contest_results_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

async function clearData(){
  if(!confirm('Delete ALL participant data? This cannot be undone.'))return;
  try{
    await fetch(API_BASE+'/api/score?action=clear&password='+encodeURIComponent(ADMIN_PASSWORD),{method:'DELETE'});
    allData=[];
    renderDashboard();
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
